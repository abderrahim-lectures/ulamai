name = "examples"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["formalize", "prove"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

[[lean_lib]]
name = "formalize"
globs = ["formalize.+"]

[[lean_lib]]
name = "prove"
globs = ["prove.+"]
